name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: anvil
          POSTGRES_PASSWORD: anvil
          POSTGRES_DB: anvil
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U anvil -d anvil"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      ANVIL_DATABASE_URL: postgresql://anvil:anvil@localhost:5433/anvil
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache sentence-transformers models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('src/anvil/config.py') }}

      - name: Install
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Ingest corpus (keyless fallback embedder)
        run: uv run anvil ingest --embedder fallback

      - name: Tests
        run: uv run pytest

      - name: Retrieval eval (keyless)
        run: uv run anvil eval retrieval --embedder fallback

      - name: Regression gate
        run: uv run anvil gate --baseline baselines/retrieval_baseline.json
